name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Set this to the branch containing your source code
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '14'  # Specify the Node.js version based on your project requirements
      - run: npm install
      - run: npm run build  # Ensure this script correctly builds your project
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # This is the target branch for deployment
          folder: build  # This should match the output folder of your build script
          token: ${{ secrets.GITHUB_TOKEN }}  # Uses a built-in token for GitHub Actions
