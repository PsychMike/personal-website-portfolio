<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Blogger</title>
    <link rel="stylesheet" href="styles/blogger_styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
</head>
<body>
    <div class="back-button">
        <a href="{{ site.github.repository_nwo }}/" target="_self">Back to Projects</a>
    </div>
    <header>
        <h1 class="bloggerRegister">Register for Blogger</h1>
    </header>

    <main>
        <form action="/register" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Register</button>
        </form>
    </main>

    <footer>
        <p>Copyright © <script>document.write(new Date().getFullYear())</script> Blogger. All rights reserved.</p>
    </footer>
</body>
</html>
